<div class="chat-page">
    <div class="chat-title">
         SHARE YOUR THOUGHTS WITH THE GLOBE
        <span class="chat-subtitle">Talk to the SOLARA community</span>
    </div>
    <div class="messages-area" id="messages-area"></div>
    <div class="input-row">
        <input type="text" id="message-input" placeholder="Skibidi Toilet is the best game ever!">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<footer class="footy">

        </div>
    </div>
</footer>

<script>
    function sendMessage() {
        var input = document.getElementById("message-input");
        if (input.value === "") return;

        var area = document.getElementById("messages-area");
        var bubble = document.createElement("div");
        bubble.className = "bubble me";
        bubble.innerHTML = "<span class='who'>guest_user</span>" + input.value;
        area.appendChild(bubble);
        area.scrollTop = area.scrollHeight;
        input.value = "";
    }

    document.getElementById("message-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });

</script>

</body>
